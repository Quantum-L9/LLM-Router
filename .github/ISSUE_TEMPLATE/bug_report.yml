name: Bug Report
description: Report a reproducible bug in any Quantum-L9 repository
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill out all fields completely.
        Incomplete reports may be closed without investigation.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Run command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: repo
    attributes:
      label: Affected Repository
      options:
        - l9-ci-core
        - Cursor-Governance
        - l9-assurance
        - .github (org backbone)
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: workflow-name
    attributes:
      label: Workflow Name (if CI-related)
      description: "e.g. pr-pipeline.yml, security.yml"
      placeholder: "pr-pipeline.yml"

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.12"

  - type: input
    id: node-version
    attributes:
      label: Node Version (if applicable)
      placeholder: "20"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "ubuntu-latest / macOS 14 / Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant log output or attach screenshots.
      render: shell

  - type: input
    id: related-issues
    attributes:
      label: Related Issues / PRs
      placeholder: "#123, #456"
